name: CI
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      # tesseract-ocr: the system binary the OCR-fallback path shells out to
      # via pytesseract - without it, tests/test_ocr_extraction.py's one
      # real-Tesseract test skips itself rather than failing (see its
      # shutil.which("tesseract") guard), but installing it here means CI
      # actually exercises real OCR instead of always skipping that test.
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr
      - run: pip install -e '.[dev]'
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy app
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run build

  # Report-only dependency vulnerability scans: no documented severity policy
  # exists to gate merges on, so findings are surfaced (visible in the Actions
  # log) without failing the workflow. continue-on-error keeps these two jobs
  # from blocking PRs while still making advisories easy to find.
  backend-dependency-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -e '.[dev]'
      - run: pip install pip-audit
      - name: pip-audit (report-only)
        continue-on-error: true
        run: pip-audit

  frontend-dependency-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - name: npm audit (report-only)
        continue-on-error: true
        run: npm audit
