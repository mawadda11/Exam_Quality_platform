services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: exam_quality
      POSTGRES_USER: exam_quality
      POSTGRES_PASSWORD: exam_quality
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exam_quality -d exam_quality"]
      interval: 5s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:0.5.23
    ports: ["8001:8000"]
    volumes: [chroma_data:/chroma/chroma]

  backend:
    build: ./backend
    env_file: .env
    ports: ["8000:8000"]
    volumes:
      - ./backend:/app/backend
      - ./knowledge_base:/app/knowledge_base:ro
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports: ["5173:5173"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on: [backend]

volumes:
  postgres_data:
  chroma_data:
